<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJNG | Šifrovaný Uzel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --red: #ff0000; 
            --red-glow: rgba(255, 0, 0, 0.5);
            --dark-bg: #050505; 
            --card-bg: rgba(20, 20, 20, 0.8);
            --green: #00ff00; 
            --cyan: #00ffff; 
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: var(--dark-bg); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Efekt pozadí - Matrix/Darkweb vibe */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 70% 30%, #1a0505 0%, transparent 50%);
            z-index: -1;
        }

        /* Sidebar - ultra moderní */
        nav { 
            width: 280px; 
            background: rgba(0, 0, 0, 0.95); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 30px 20px;
            backdrop-filter: blur(10px);
        }

        .user-info { 
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            position: relative;
        }

        .user-info::after {
            content: "ONLINE";
            position: absolute;
            top: 10px; right: 10px;
            font-size: 0.6em;
            color: var(--green);
            text-shadow: 0 0 5px var(--green);
        }

        #username { font-size: 1.1em; letter-spacing: 1px; font-weight: bold; color: #fff; }

        .role-tag { 
            font-size: 0.65em; 
            border: 1px solid var(--red); 
            color: var(--red); 
            padding: 3px 8px; 
            margin-top: 8px; 
            display: inline-block; 
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 4px;
        }

        .nav-link { 
            color: #666; 
            text-decoration: none; 
            padding: 14px 15px; 
            display: block; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-transform: uppercase; 
            font-size: 0.8em; 
            letter-spacing: 2px;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .nav-link:hover { 
            color: #fff; 
            background: rgba(255, 0, 0, 0.1);
            transform: translateX(10px);
            box-shadow: -5px 0 0 var(--red);
        }

        .active { 
            color: #fff; 
            background: rgba(255, 0, 0, 0.15); 
            box-shadow: -5px 0 0 var(--red);
        }

        /* Hlavní plocha */
        main { 
            flex: 1; 
            padding: 50px; 
            overflow-y: auto; 
        }

        h1 { 
            font-size: 1.8em;
            text-transform: uppercase; 
            letter-spacing: 8px; 
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Karty s efektem skla */
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 25px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            transition: transform 0.3s;
        }

        .card:hover {
            border-color: rgba(255, 0, 0, 0.3);
            transform: translateY(-5px);
        }

        h3 { 
            font-size: 0.8em; 
            color: #888; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-top: 0;
        }

        .stat-value { 
            font-size: 2.8em; 
            font-weight: bold; 
            margin: 10px 0;
            font-family: 'monospace';
        }

        /* Skrývání obsahu */
        .maestro-only, .vedeni-only { display: none; }

        /* Moderní tabulka */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th { text-align: left; color: #444; text-transform: uppercase; padding: 15px; border-bottom: 2px solid #222; }
        td { padding: 15px; border-bottom: 1px solid #111; color: #bbb; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .btn-logout { 
            margin-top: auto; 
            color: #444; 
            font-size: 0.7em; 
            border: 1px solid #222;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-logout:hover { border-color: var(--red); color: var(--red); }

        /* Animace pro naběhnutí */
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <nav>
        <div class="user-info">
            <div id="username">Načítání...</div>
            <div id="user-role-display"></div>
        </div>
        
        <div class="nav-link active">PŘEHLED UZLU</div>
        <div class="nav-link">PERSONÁLNÍ SLOŽKA</div>
        <div class="nav-link maestro-only">DISTRIBUCE NARKOTIK</div>
        <div class="nav-link vedeni-only">HLAVNÍ TREZOR</div>
        <div class="nav-link vedeni-only">OPERATIVNÍ SÍŤ</div>
        <div class="nav-link">KODEX C.J.N.G.</div>
        
        <div class="btn-logout" onclick="location.href='/'">TERM_DEACTIVATE</div>
    </nav>

    <main class="fade-in">
        <h1>TERMINÁL_SÍTĚ_V4</h1>
        
        <div class="vedeni-only card">
            <h3>CELKOVÉ PASIVA ORGANIZACE</h3>
            <div class="stat-value" style="color: var(--red); text-shadow: 0 0 15px var(--red-glow);" id="org-debt">0 KS</div>
        </div>

        <div class="card">
            <h3>MOJE AKTUÁLNÍ OPERACE</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 15px;">
                <div>
                    <span style="font-size: 0.7em; color: #555;">PŘIJATO</span>
                    <div id="my-vydano" style="color: var(--green); font-size: 1.5em; font-weight: bold;">0</div>
                </div>
                <div>
                    <span style="font-size: 0.7em; color: #555;">ODEVZDÁNO</span>
                    <div id="my-odevzdano" style="color: var(--cyan); font-size: 1.5em; font-weight: bold;">0</div>
                </div>
                <div>
                    <span style="font-size: 0.7em; color: #555;">DLUH</span>
                    <div id="my-dluh" style="color: var(--red); font-size: 1.5em; font-weight: bold;">0</div>
                </div>
            </div>
        </div>

        <div class="maestro-only card">
            <h3>LOGISTICKÝ MANAŽER</h3>
            <div id="admin-table-area">
                <p style="color: #444; font-size: 0.8em; font-style: italic;">Skenuji centrální uzel pro aktivní dlužníky...</p>
            </div>
        </div>
    </main>

    <script>
        // --- KONFIGURACE ROLÍ ---
        const ROLES = {
            VEDENI: "1468388299642241281",
            MAESTRO: "1429877779918491789",
            IT_TECHNIK: "1489322789205971174",
            MARINA: "1417573119664722185",
            ZAMESTNANCI: ["1434516891212316744", "1417244306334547978", "1417244307336859730"] 
        };

        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user') || "NEZNÁMÝ_SUBJEKT";
        const userRoles = (urlParams.get('roles') || "").split(',');

        document.getElementById('username').innerText = username.toUpperCase();

        function checkPermissions() {
            let display = document.getElementById('user-role-display');
            display.innerHTML = '';

            if (userRoles.includes(ROLES.VEDENI) || userRoles.includes(ROLES.IT_TECHNIK)) {
                document.querySelectorAll('.vedeni-only, .maestro-only').forEach(el => el.style.display = 'block');
                display.innerHTML = '<span class="role-tag">VEDENÍ KARTELU</span>';
            } 
            else if (userRoles.includes(ROLES.MARINA)) {
                document.querySelectorAll('.vedeni-only').forEach(el => el.style.display = 'block');
                display.innerHTML = '<span class="role-tag" style="color:var(--cyan); border-color:var(--cyan); background:rgba(0,255,255,0.1);">A-TEAM DOHLED</span>';
            }
            else if (userRoles.includes(ROLES.MAESTRO)) {
                document.querySelectorAll('.maestro-only').forEach(el => el.style.display = 'block');
                display.innerHTML = '<span class="role-tag" style="color:var(--green); border-color:var(--green); background:rgba(0,255,0,0.1);">DISTRIBUTOR</span>';
            }
            else {
                display.innerHTML = '<span class="role-tag" style="color:#888; border-color:#444; background:rgba(255,255,255,0.05);">ZAMĚSTNANEC CJNG</span>';
            }
        }

        checkPermissions();
    </script>
</body>
</html>
