<div class="view-header">VEDENÍ OPERACÍ // ADMINISTRACE</div>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card">
        <h3>REGISTROVAT ZAMĚSTNANCE</h3>
        <p style="font-size: 12px; color: #888;">Zadejte Discord ID pro vytvoření přístupu.</p>
        <input type="text" id="reg-discord-id" placeholder="Discord ID" style="width:100%; background:#000; border:1px solid var(--red); color:#fff; padding:10px; margin: 10px 0;">
        <input type="text" id="reg-name" placeholder="Jméno a Příjmení (IC)" style="width:100%; background:#000; border:1px solid var(--red); color:#fff; padding:10px; margin-bottom: 10px;">
        <button onclick="registerMember()" style="width:100%; background:var(--red); color:#000; border:none; padding:10px; font-weight:bold; cursor:pointer;">VYTVOŘIT SLOŽKU</button>
    </div>
    <div class="card">
        <h3>FINANČNÍ ANALYTIKA KARTELU</h3>
        <canvas id="orgFinChart"></canvas>
    </div>
</div>
