<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJNG | Operační Systém</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Změna fontů pro plnou podporu češtiny -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #ff0000; --red-glow: rgba(255, 0, 0, 0.7);
            --bg: #020202; --card-bg: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 0, 0, 0.25);
            --green: #00ff41;
        }
        body { background: var(--bg); color: #fff; font-family: 'Exo 2', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Terminal Welcome Overlay - Upraveno pro profi efekty */
        #terminal-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Ubuntu Mono', monospace; color: var(--red);
        }
        .term-box { 
            border: 1px solid var(--red); padding: 40px; background: rgba(5,0,0,0.95); 
            box-shadow: 0 0 50px rgba(255,0,0,0.2); text-align: left; 
            min-width: 500px; position: relative; overflow: hidden;
        }
        .term-box::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--red); animation: scanline 4s linear infinite; opacity: 0.3;
        }
        @keyframes scanline { 0% { top: 0; } 100% { top: 100%; } }

        .term-header { font-size: 0.9em; margin-bottom: 25px; color: #444; border-bottom: 1px solid #222; padding-bottom: 10px; }
        #term-text { line-height: 1.6; font-size: 1.1em; min-height: 100px; }
        .glitch-text { animation: glitch 0.2s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(-2px, -1px); }
            60% { transform: translate(2px, 1px); }
            80% { transform: translate(2px, -1px); }
            100% { transform: translate(0); }
        }

        /* Sidebar & Menu */
        nav { width: 280px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 15px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 100; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        nav.collapsed { transform: translateX(-100%); position: absolute; }
        .brand { font-family: 'Exo 2'; font-weight: 700; font-size: 2.2em; color: var(--red); text-align: center; letter-spacing: 5px; margin-bottom: 40px; text-shadow: 0 0 10px var(--red-glow); }
        
        .user-info { padding: 20px; margin-bottom: 30px; background: rgba(0, 0, 0, 0.8); position: relative; border: 1px solid var(--border); overflow: hidden; }
        .user-info::after { content: ""; position: absolute; inset: 2px; background: #000; z-index: 1; }
        .user-content { position: relative; z-index: 2; }
        #display-name { font-weight: 700; font-size: 1.2em; margin-bottom: 5px; color: #fff; }
        .role-badge { font-weight: 700; font-size: 0.75em; padding: 4px 10px; border: 1px solid var(--red); color: var(--red); text-transform: uppercase; display: inline-block; letter-spacing: 1px; margin-top: 5px; }

        .category-trigger { width: 100%; background: none; border: none; color: #aaa; padding: 12px 10px; text-align: left; font-family: 'Exo 2'; font-weight: 700; font-size: 0.9em; cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; border-bottom: 1px solid transparent; }
        .category-trigger:hover { color: var(--red); border-bottom: 1px solid var(--red); }
        .nav-link { color: #666; text-decoration: none; display: block; padding: 10px 25px; font-size: 0.9em; transition: 0.3s; text-transform: uppercase; }
        .nav-link:hover { color: #fff; background: rgba(255,0,0,0.05); padding-left: 30px; }

        main { flex: 1; padding: 40px; overflow: hidden; background: radial-gradient(circle at center, #1a0202 0%, #020202 100%); display: flex; flex-direction: column; position: relative; }
        .welcome-header { font-family: 'Exo 2'; font-weight: 700; color: var(--red); font-size: 2.5em; letter-spacing: 10px; text-shadow: 0 0 20px var(--red-glow); margin: 0; }

        /* UI Popups */
        .ui-popup { position: absolute; background: rgba(0,0,0,0.9); border: 1px solid var(--red); padding: 8px 15px; font-size: 0.7em; font-family: 'Ubuntu Mono'; color: var(--red); box-shadow: 0 0 15px rgba(255,0,0,0.2); opacity: 0; z-index: 50; }
        .ui-popup.active { animation: slidePopup 4s forwards; }
        @keyframes slidePopup { 0% { transform: translateY(20px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-40px); opacity: 0; } }

        /* Rest of functional CSS remains same but with Exo 2 font */
        .card-title, .stat, .log-header, .chat-send, .dossier-header { font-family: 'Exo 2'; }
        .stat { font-weight: 700; font-size: 2.2em; }
        .log-content, .chat-messages { font-family: 'Ubuntu Mono'; }

        @media (max-width: 768px) {
            nav { width: 100%; height: 100%; position: fixed; transform: translateX(-100%); }
            nav:not(.collapsed) { transform: translateX(0); }
        }
    </style>
</head>
<body>

    <!-- Terminal Login Animation -->
    <div id="terminal-overlay">
        <div class="term-box">
            <div class="term-header">CJNG_NETWORK_OS [Verze 4.0.12]</div>
            <div id="term-text"></div>
        </div>
    </div>

    <button class="open-btn" id="openBtn" style="position: fixed; left: 15px; top: 15px; background: #000; border: 1px solid var(--red); color: var(--red); padding: 8px 12px; cursor: pointer; z-index: 90; display: block;" onclick="toggleSidebar()">☰ MENU</button>

    <nav id="sidebar" class="collapsed">
        <button style="position: absolute; right: 10px; top: 10px; background: none; border: none; color: var(--red); cursor: pointer; font-size: 1.5em;" onclick="toggleSidebar()">✕</button>
        <div class="brand">CJNG</div>
        <div class="user-info">
            <div class="user-content">
                <div id="display-name">NAČÍTÁNÍ...</div>
                <div id="display-badge"></div>
            </div>
        </div>

        <div class="menu-container">
            <div class="menu-category">
                <button class="category-trigger" onclick="toggleSubmenu(this)">OSOBNÍ TERMINÁL <i>▼</i></button>
                <div class="submenu open">
                    <a href="#" class="nav-link" onclick="handleNav('dossier')">Vlastní složka (Dossier)</a>
                </div>
            </div>
            <div class="menu-category maestro-only vedeni-only" style="display:none;">
                <button class="category-trigger" onclick="toggleSubmenu(this)">VEDENÍ <i>▼</i></button>
                <div class="submenu open">
                    <a href="#" class="nav-link" onclick="handleNav('dashboard')">Přehled operací</a>
                </div>
            </div>
        </div>
        <div class="logout" style="padding: 15px; color: #444; cursor: pointer; font-size: 0.8em; text-align: center; border-top: 1px solid var(--border);" onclick="location.href='/'">ODHLÁSIT SE</div>
    </nav>

    <main>
        <div id="welcome-view" style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div style="position: absolute; top: 20px; right: 20px; color: var(--green); font-family: 'Ubuntu Mono'; font-size: 0.8em;">
                <span style="display:inline-block; width:8px; height:8px; background:var(--green); border-radius:50%; margin-right:5px; animation: blink 1s infinite;"></span>
                PŘIPOJENO // ŠIFROVÁNÍ AKTIVNÍ
            </div>
            
            <div style="text-align: center; width: 100%; margin-bottom: 50px;">
                <h1 class="welcome-header">CJNG GLOBAL</h1>
                <div style="color: #444; font-size: 0.7em; letter-spacing: 5px; margin-top: 10px;">PŘÍSTUP POVOLEN // FIREWALL BYPASSED</div>
            </div>

            <div id="popups-container"></div>

            <div style="position: relative; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center;">
                <div style="position: absolute; border: 1px dashed var(--border); border-radius: 50%; width: 350px; height: 350px; animation: rotate 20s linear infinite;"></div>
                <div style="position: absolute; border: 1px double var(--red); border-radius: 50%; width: 400px; height: 400px; opacity: 0.2; animation: rotate 15s linear infinite reverse;"></div>
                <div style="width: 200px; height: 200px; background: url('https://r2.fivemanage.com/wOMQm0cEVI73Ppitz2tQP/Ch3dZmRrLL.png') center/contain no-repeat; filter: drop-shadow(0 0 15px var(--red));"></div>
            </div>
        </div>

        <!-- Dashboard & Dossier remain structurally same, fonts will inherit Exo 2 -->
        <div id="dashboard-view" style="display: none;">
            <div class="grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div class="card" style="background: var(--card-bg); border: 1px solid var(--border); padding: 30px; text-align:center;">
                    <div class="card-title" style="color: #666; font-size: 0.8em; margin-bottom: 10px;">CELKEM ODEBRANÉ ZÁSILKY</div>
                    <div id="my-vydano" class="stat">0 KS</div>
                </div>
                <div class="card" style="background: var(--card-bg); border: 1px solid var(--border); padding: 30px; text-align:center;">
                    <div class="card-title" style="color: #666; font-size: 0.8em; margin-bottom: 10px;">OPERAČNÍ DLUH</div>
                    <div id="my-dluh" class="stat" style="color: var(--red);">0 KS</div>
                </div>
                <div class="card" style="background: var(--card-bg); border: 1px solid var(--border); padding: 30px; text-align:center;">
                    <div class="card-title" style="color: #666; font-size: 0.8em; margin-bottom: 10px;">STATUS</div>
                    <div class="stat" style="color: var(--green); font-size: 1.5em;">AKTIVNÍ</div>
                </div>
            </div>
        </div>

        <div id="dossier-section" style="display: none;">
            <div class="dossier-header" style="color: var(--red); font-size: 1.8em; border-bottom: 1px solid var(--border); margin-bottom: 20px; padding-bottom: 10px;">Personální Dossier // Šifrováno</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                <div style="background: rgba(10,10,10,0.9); border: 1px solid var(--border); padding: 20px; border-left: 3px solid var(--red);">
                    <div style="font-size: 0.7em; color: #555;">KVÓTA</div>
                    <div id="d-kvota" class="stat" style="font-size: 1.5em;">500 KS</div>
                </div>
                <!-- ... other dossier cards ... -->
            </div>
        </div>
    </main>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playFX(freq, type, duration, vol) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const SFX = {
            data: () => playFX(Math.random() * 500 + 200, 'sine', 0.05, 0.02),
            success: () => {
                playFX(400, 'square', 0.1, 0.05);
                setTimeout(() => playFX(800, 'square', 0.2, 0.05), 100);
            }
        };

        const SB_URL = 'https://ybzprivahzjqpanvunli.supabase.co'; 
        const SB_KEY = 'sb_publishable_cLNB6oc2TrhDxdelrq6mjQ_0pSZFVb5';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const uName = urlParams.get('user') || "OPERATIVEC";
        const rArr = (urlParams.get('roles') || "").split(',');
        const uId = urlParams.get('id');

        // Dynamické zjištění role pro uvítání
        const ROLES = { VEDENI: "1468388299642241281", MAESTRO: "1429877779918491789" };
        let userRoleLabel = "OPERATIVEC CJNG";
        if (rArr.includes(ROLES.VEDENI)) userRoleLabel = "VEDENÍ KARTELU";
        else if (rArr.includes(ROLES.MAESTRO)) userRoleLabel = "MAESTRO";

        async function startSequence() {
            const term = document.getElementById('term-text');
            const overlay = document.getElementById('terminal-overlay');
            
            const lines = [
                "> NAVAZOVÁNÍ SPOJENÍ S GLOBÁLNÍ SÍTÍ...",
                "> TUNELOVÁNÍ SKRZE FIREWALL...",
                "> DEŠIFROVÁNÍ IDENTIFIKAČNÍCH TOKENŮ...",
                "> IDENTITY_CHECK: OK",
                `> VÍTEJTE, UŽIVATELI: <span class="glitch-text" style="color:#fff">${uName.toUpperCase()}</span>`,
                `> ÚROVEŇ PŘÍSTUPU: <span style="color:var(--green)">${userRoleLabel}</span>`,
                "> PŘÍPRAVA PRACOVNÍHO PROSTŘEDÍ...",
                "> SYSTÉM PŘIPRAVEN."
            ];

            for(let i=0; i<lines.length; i++) {
                const p = document.createElement('div');
                p.style.marginBottom = "5px";
                term.appendChild(p);
                
                // Efekt psacího stroje pro každý řádek
                let charIndex = 0;
                const lineText = lines[i];
                while(charIndex < lineText.length) {
                    if(lineText[charIndex] === '<') { // Přeskočit HTML tagy pro plynulost
                        const tagEnd = lineText.indexOf('>', charIndex);
                        p.innerHTML += lineText.substring(charIndex, tagEnd + 1);
                        charIndex = tagEnd + 1;
                    } else {
                        p.innerHTML += lineText[charIndex];
                        charIndex++;
                        if(charIndex % 3 === 0) SFX.data();
                        await new Promise(r => setTimeout(r, 20));
                    }
                }
                await new Promise(r => setTimeout(r, 600)); // Pauza mezi řádky
            }

            SFX.success();
            await new Promise(r => setTimeout(r, 1000));
            overlay.style.transition = "all 1s cubic-bezier(0.8, 0, 0.2, 1)";
            overlay.style.opacity = "0";
            overlay.style.transform = "scale(1.1)";
            setTimeout(() => overlay.remove(), 1000);
        }

        function toggleSidebar() {
            const nav = document.getElementById('sidebar');
            nav.classList.toggle('collapsed');
        }

        function handleNav(view) {
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = view === 'dashboard' ? 'block' : 'none';
            document.getElementById('dossier-section').style.display = view === 'dossier' ? 'block' : 'none';
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function toggleSubmenu(btn) {
            const sub = btn.nextElementSibling;
            sub.style.display = sub.style.display === 'none' ? 'block' : 'none';
        }

        window.onload = () => {
            document.getElementById('display-name').innerText = uName.toUpperCase();
            document.getElementById('display-badge').innerHTML = `<span class="role-badge">${userRoleLabel}</span>`;
            
            if (rArr.includes(ROLES.VEDENI) || rArr.includes(ROLES.MAESTRO)) {
                document.querySelectorAll('.vedeni-only, .maestro-only').forEach(e => e.style.display = 'block');
            }
            
            startSequence();
        };

        // UI Popups pro atmosféru
        setInterval(() => {
            if(Math.random() > 0.7) {
                const container = document.getElementById('popups-container');
                const p = document.createElement('div');
                p.className = 'ui-popup active';
                p.style.left = Math.random() * 80 + '%';
                p.style.top = Math.random() * 80 + '%';
                p.innerText = "SIGNAL_STRENGTH: " + (Math.random()*100).toFixed(2) + "dB";
                container.appendChild(p);
                setTimeout(() => p.remove(), 4000);
            }
        }, 3000);
    </script>
</body>
</html>
