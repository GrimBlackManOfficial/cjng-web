<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÍŤ CJNG | ZABEZPEČENO</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            /* Efekt starého monitoru */
            text-shadow: 0 0 2px #0f0;
        }
        
        /* Čára skeneru, co jezdí nahoru a dolů */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal { 
            width: 90%; 
            max-width: 750px; 
            z-index: 3;
            background: rgba(0, 20, 0, 0.1);
            padding: 30px;
            border: 1px solid rgba(0, 255, 0, 0.1);
        }

        .line { 
            margin-bottom: 6px; 
            opacity: 0; 
            transform: translateX(-10px); 
            animation: slideIn 0.1s forwards; 
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        @keyframes slideIn { 
            to { opacity: 1; transform: translateX(0); } 
        }

        .red { color: #f00; font-weight: bold; text-shadow: 0 0 8px #f00; }
        .white { color: #fff; text-shadow: 0 0 5px #fff; }

        .btn-login { 
            display: none; 
            background: transparent; 
            color: #f00; 
            border: 2px solid #f00; 
            padding: 20px 40px; 
            font-family: 'Courier New', monospace; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 40px; 
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            background: #f00;
            color: #000;
            box-shadow: 0 0 50px #f00;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0, 255, 0, 0) 0%, rgba(255, 0, 0, 0.2) 50%, rgba(0, 255, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div id="terminal"></div>

    <script>
        const lines = [
            "> [INFO] SPOUŠTÍM PROTOKOL 'CARTEL-NET'...",
            "> [INFO] NAVAZUJI SPOJENÍ S PÁTEŘNÍ SÍTÍ...",
            "> [OK] ŠIFROVÁNÍ KONCOVÝCH BODŮ AKTIVNÍ.",
            "> [WAIT] PROTLAČUJI DATAPAKETY PŘES BRÁNU_01...",
            "> [OK] PŘÍSTUP K CENTRÁLNÍMU TREZORU SCHVÁLEN.",
            "> [INFO] ANALÝZA LOKALITY... <span class='white'>ZAMASKOVÁNO</span>",
            "> [INFO] NAČÍTÁM PERSONÁLNÍ SLOŽKY ZAMĚSTNANCŮ...",
            "> [INFO] SYNCHRONIZACE DISTRIBUČNÍCH GRAFŮ...",
            "> [OK] SYSTÉM JE PLNĚ SYNCHRONIZOVÁN.",
            " ",
            "<span class='red'>> VAROVÁNÍ: VSTUPUJETE DO SOUKROMÉ SÍTĚ ORGANIZACE CJNG.</span>",
            "<span class='red'>> KAŽDÝ POHYB JE ZAZNAMENÁVÁN A ANALYZOVÁN.</span>",
            " ",
            "> SYSTÉM VYŽADUJE BIOMETRICKOU IDENTIFIKACI:"
        ];

        const terminal = document.getElementById('terminal');
        let index = 0;

        function addLine() {
            if (index < lines.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = lines[index];
                terminal.appendChild(div);
                index++;
                
                // Náhodná pauza pro efekt "přemýšlení" stroje
                let delay = Math.random() * (800 - 200) + 200;
                if (index === 4 || index === 7) delay = 1500; // Delší pauza u kritických bodů

                setTimeout(addLine, delay);
            } else {
                const btn = document.createElement('button');
                btn.className = 'btn-login';
                btn.innerHTML = "POTVRDIT IDENTITU";
                
                btn.onclick = () => { 
                    window.location.href = '/api/auth/login'; 
                };
                
                terminal.appendChild(btn);
                btn.style.display = "block";
            }
        }

        window.onload = addLine;
    </script>
</body>
</html>
