<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SÍŤ CJNG | AUTHENTICATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff0000;
            --red-glow: rgba(255, 0, 0, 0.6);
            --bg: #050000;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-transform: uppercase;
        }

        /* Scanline efekt (přesně jako na dashboardu) */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            z-index: 10;
            pointer-events: none;
        }

        #terminal-container { 
            width: 90%; 
            max-width: 800px; 
            z-index: 5;
            background: rgba(10, 0, 0, 0.8);
            padding: 40px;
            border-left: 2px solid var(--red);
            box-shadow: -10px 0 30px rgba(255, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5em;
            letter-spacing: 10px;
            color: var(--red);
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--red-glow);
        }

        .line { 
            margin-bottom: 8px; 
            opacity: 0; 
            transform: translateX(-5px); 
            animation: fadeIn 0.2s forwards; 
            font-size: 0.9em;
            letter-spacing: 2px;
            color: #ccc;
        }

        @keyframes fadeIn { 
            to { opacity: 1; transform: translateX(0); } 
        }

        .status-ok { color: #00ff41; font-weight: bold; }
        .status-wait { color: #ffcc00; }
        .status-critical { color: var(--red); font-weight: bold; text-shadow: 0 0 5px var(--red); }

        .btn-login { 
            display: none; 
            background: transparent; 
            color: #fff; 
            border: 1px solid var(--red); 
            padding: 15px 35px; 
            font-family: 'Orbitron', monospace; 
            cursor: pointer; 
            margin-top: 40px; 
            letter-spacing: 5px;
            transition: all 0.4s ease;
            text-shadow: 0 0 5px var(--red-glow);
            position: relative;
        }

        .btn-login:hover {
            background: var(--red);
            color: #000;
            box-shadow: 0 0 30px var(--red-glow);
            transform: scale(1.05);
        }

        .typing::after {
            content: "|";
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div class="header">CJNG_MAINFRAME</div>
        <div id="terminal-body"></div>
    </div>

    <script>
        const lines = [
            "> INITIALIZING ENCRYPTED UPLINK...",
            "> CONNECTION: <span class='status-ok'>ESTABLISHED</span>",
            "> BYPASSING REGIONAL FIREWALLS... <span class='status-ok'>DONE</span>",
            "> LOADING PERSONAL_DOSSIER_DATABASE...",
            "> DECRYPTING ACCESS_PROTOCOLS...",
            "> STATUS: <span class='status-critical'>UNAUTHORIZED ACCESS DETECTED</span>",
            "> APPLYING 'CJNG' CLOAKING SIGNATURE...",
            "> ACCESS GRANTED. WELCOME, OPERATIVE."
        ];

        const terminalBody = document.getElementById('terminal-body');
        let index = 0;

        function addLine() {
            if (index < lines.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = lines[index];
                terminalBody.appendChild(div);
                index++;
                
                // Rychlejší sekvence (200-500ms místo původních 800ms)
                let delay = Math.random() * (400 - 150) + 150;
                
                // Jedna malá pauza uprostřed pro efekt
                if (index === 4) delay = 800; 

                setTimeout(addLine, delay);
            } else {
                showButton();
            }
        }

        function showButton() {
            const btn = document.createElement('button');
            btn.className = 'btn-login';
            btn.innerHTML = "AUTHORIZE IDENTITY";
            
            btn.onclick = () => { 
                btn.innerHTML = "CONNECTING...";
                window.location.href = '/api/auth/login'; 
            };
            
            terminalBody.appendChild(btn);
            setTimeout(() => {
                btn.style.display = "block";
            }, 300);
        }

        window.onload = addLine;
    </script>
</body>
</html>
