<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJNG | Operační Systém</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #ff0000; --red-glow: rgba(255, 0, 0, 0.7);
            --bg: #020202; --card-bg: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 0, 0, 0.25);
        }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        nav { width: 280px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 15px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 100; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        nav.collapsed { transform: translateX(-100%); position: absolute; }
        
        .brand { font-family: 'Orbitron'; font-size: 2.2em; color: var(--red); text-align: center; letter-spacing: 5px; margin-bottom: 40px; text-shadow: 0 0 10px var(--red-glow); }
        
        /* Ovládání minimalizace */
        .sidebar-toggle { position: absolute; right: 10px; top: 10px; background: none; border: none; color: var(--red); cursor: pointer; font-family: 'Orbitron'; font-weight: bold; z-index: 110; font-size: 1.2em; }
        .open-btn { position: fixed; left: 15px; top: 15px; background: #000; border: 1px solid var(--red); color: var(--red); padding: 8px 12px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.8em; z-index: 90; display: none; box-shadow: 0 0 10px var(--red-glow); }

        /* Box s rotujícím okrajem */
        .user-info { padding: 20px; margin-bottom: 30px; background: rgba(0, 0, 0, 0.8); position: relative; border: 1px solid var(--border); overflow: hidden; }
        .user-info::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, transparent, var(--red)); animation: rotate-border 4s linear infinite; z-index: 0; }
        .user-info::after { content: ""; position: absolute; inset: 2px; background: #000; z-index: 1; }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        .user-content { position: relative; z-index: 2; }
        
        #display-name { font-family: 'Rajdhani'; font-weight: 700; font-size: 1.1em; margin-bottom: 10px; color: #fff; letter-spacing: 1px; }
        .role-badge { font-family: 'Rajdhani'; font-weight: 700; font-size: 0.75em; padding: 4px 10px; border: 1px solid var(--red); color: var(--red); text-transform: uppercase; display: inline-block; letter-spacing: 1px; }

        /* Menu */
        .menu-container { flex: 1; overflow-y: auto; }
        .menu-category { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .category-trigger { width: 100%; background: none; border: none; color: #aaa; padding: 12px 10px; text-align: left; font-family: 'Rajdhani'; font-weight: 700; font-size: 0.9em; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; letter-spacing: 1px; text-transform: uppercase; }
        .category-trigger:hover { color: var(--red); background: rgba(255,0,0,0.03); }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: rgba(255,255,255,0.02); }
        .submenu.open { max-height: 300px; }
        .nav-link { color: #666; text-decoration: none; display: block; padding: 10px 25px; font-size: 0.9em; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); padding-left: 30px; }

        /* Main Content */
        main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #1a0202 0%, #020202 60%); transition: all 0.4s; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; backdrop-filter: blur(10px); position: relative; }
        .card-title { font-family: 'Rajdhani'; font-weight: 700; font-size: 0.8em; color: #666; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .stat { font-family: 'Orbitron'; font-size: 2.2em; }
        
        /* Dossier & Chat */
        #dossier-section { display: none; margin-top: 10px; }
        .dossier-header { font-family: 'Rajdhani'; font-weight: 700; color: var(--red); letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; font-size: 1.8em; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .dossier-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .dossier-card { background: rgba(10,10,10,0.9); border: 1px solid var(--border); padding: 20px; border-left: 3px solid var(--red); }
        
        .logs-chat-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; grid-column: span 3; }
        .system-logs, .intercom-panel { background: #000; border: 1px solid var(--border); height: 350px; display: flex; flex-direction: column; }
        .log-header { padding: 10px; background: rgba(255,0,0,0.1); font-family: 'Rajdhani'; font-weight: 700; font-size: 0.8em; letter-spacing: 2px; color: var(--red); border-bottom: 1px solid var(--border); }
        .log-content, .chat-messages { flex: 1; overflow-y: auto; padding: 15px; font-family: 'Rajdhani'; font-size: 0.9em; }
        
        .bubble { max-width: 85%; padding: 10px 15px; border-radius: 5px; margin-bottom: 10px; line-height: 1.4; }
        .bubble.admin { align-self: flex-start; background: rgba(255,0,0,0.15); border: 1px solid var(--red); color: #fff; }
        .bubble.user { align-self: flex-end; background: #222; border: 1px solid #444; color: #ccc; }
        .bubble-meta { font-size: 0.6em; text-transform: uppercase; margin-bottom: 4px; opacity: 0.6; }

        .chat-input-area { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px; font-family: 'Rajdhani'; }
        .chat-send { background: var(--red); color: #fff; border: none; padding: 0 20px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7em; }

        .admin-only, .maestro-only, .vedeni-only { display: none; }
        .logout { padding: 15px; color: #666; text-align: center; cursor: pointer; font-size: 0.9em; letter-spacing: 3px; border-top: 1px solid var(--border); transition: 0.3s; font-family: 'Rajdhani'; font-weight: 700; text-transform: uppercase; }
        .logout:hover { color: var(--red); background: rgba(255,0,0,0.05); }
        .chart-wrapper { height: 350px; position: relative; width: 100%; }

        /* RESPONSIVE DESIGN (MOBIL) */
        @media (max-width: 768px) {
            nav { width: 100%; height: 100%; position: fixed; transform: translateX(-100%); }
            nav.collapsed { transform: translateX(-100%); }
            nav:not(.collapsed) { transform: translateX(0); }
            
            main { padding: 60px 15px 20px 15px; }
            .grid { grid-template-columns: 1fr; }
            .dossier-grid { grid-template-columns: 1fr; }
            .logs-chat-container { grid-template-columns: 1fr; grid-column: span 1; }
            .card maestro-only vedeni-only { grid-column: span 1; }
            #chart-card { grid-column: span 1; }
            .stat { font-size: 1.8em; }
            .brand { font-size: 1.8em; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <button class="open-btn" id="openBtn" onclick="toggleSidebar()">☰ MENU</button>

    <nav id="sidebar" class="collapsed">
        <button class="sidebar-toggle" onclick="toggleSidebar()">✕</button>
        <div class="brand">CJNG</div>
        <div class="user-info">
            <div class="user-content">
                <div id="display-name">NAČÍTÁNÍ...</div>
                <div id="display-badge"></div>
            </div>
        </div>

        <div class="menu-container">
            <div class="menu-category">
                <button class="category-trigger" onclick="toggleSubmenu(this)">OSOBNÍ TERMINÁL <i>▶</i></button>
                <div class="submenu">
                    <a href="#" class="nav-link" onclick="handleNav('dossier')">Vlastní složka (Dossier)</a>
                </div>
            </div>
            <div class="menu-category maestro-only vedeni-only">
                <button class="category-trigger" onclick="toggleSubmenu(this)">VEDENÍ <i>▶</i></button>
                <div class="submenu">
                    <a href="#" class="nav-link" onclick="handleNav('dashboard')">Přehled operací</a>
                </div>
            </div>
        </div>
        <div class="logout" onclick="location.href='/'">Odhlásit se</div>
    </nav>

    <main>
        <div id="dashboard-view" style="display: none;">
            <div class="grid">
                <div class="card"><div class="card-title">CELKEM ODEBRANÉ ZÁSILKY</div><div id="my-vydano" class="stat">0 KS</div></div>
                <div class="card"><div class="card-title">AKTUÁLNÍ OPERAČNÍ DLUH</div><div id="my-dluh" class="stat" style="color: var(--red);">0 KS</div></div>
                <div class="card"><div class="card-title">STAV PŘIPOJENÍ</div><div class="stat" style="font-size: 1.2em; color: #00ff41;">AKTIVNÍ</div></div>
                <div class="card maestro-only vedeni-only" id="chart-card" style="grid-column: span 3;">
                    <div class="card-title">ANALYTICKÝ GRAF DISTRIBUCE</div>
                    <div class="chart-wrapper"><canvas id="profiChart"></canvas></div>
                </div>
            </div>
        </div>

        <div id="dossier-section">
            <div class="dossier-header">Personální Dossier // Šifrováno</div>
            <div class="dossier-grid">
                <div class="dossier-card"><div style="font-size: 0.7em; color: #555;">KVÓTA</div><div id="d-kvota" class="stat" style="font-size: 1.5em;">500 KS</div></div>
                <div class="dossier-card"><div style="font-size: 0.7em; color: #555;">SPLNĚNO</div><div id="d-splneno" class="stat" style="font-size: 1.5em;">0 KS</div></div>
                <div class="dossier-card"><div style="font-size: 0.7em; color: #555;">VÝDĚLEK</div><div class="stat" style="font-size: 1.5em; color: #00ff41;">125.500$</div></div>
                
                <div class="logs-chat-container">
                    <div class="system-logs">
                        <div class="log-header">OPERAČNÍ LOG</div>
                        <div id="log-content" class="log-content"></div>
                    </div>
                    <div class="intercom-panel">
                        <div class="log-header">ŠIFROVANÝ INTERKOM</div>
                        <div id="chat-box" class="chat-messages" style="display: flex; flex-direction: column;"></div>
                        <div class="chat-input-area">
                            <input type="text" id="msg-input" class="chat-input" placeholder="Zpráva...">
                            <button class="chat-send" onclick="sendMessage()">ODESLAT</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://ybzprivahzjqpanvunli.supabase.co'; 
        const SB_KEY = 'sb_publishable_cLNB6oc2TrhDxdelrq6mjQ_0pSZFVb5';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        let chartInstance = null;
        const ROLES = { VEDENI: "1468388299642241281", MAESTRO: "1429877779918491789" };
        const urlParams = new URLSearchParams(window.location.search);
        const uName = urlParams.get('user') || "OPERATIVEC";
        const rArr = (urlParams.get('roles') || "").split(',');
        const uId = urlParams.get('id');

        document.getElementById('display-name').innerText = uName.toUpperCase();

        function toggleSidebar() {
            const nav = document.getElementById('sidebar');
            const openBtn = document.getElementById('openBtn');
            nav.classList.toggle('collapsed');
            openBtn.style.display = nav.classList.contains('collapsed') ? 'block' : 'none';
        }

        // Pomocná funkce pro navigaci, aby se sidebar na mobilu sám zavřel po kliknutí
        function handleNav(view) {
            if (window.innerWidth <= 768) toggleSidebar();
            if (view === 'dossier') showDossier();
            else showDashboard();
        }

        function toggleSubmenu(btn) {
            const sub = btn.nextElementSibling;
            const open = sub.classList.contains('open');
            document.querySelectorAll('.submenu').forEach(s => s.classList.remove('open'));
            if (!open) sub.classList.add('open');
        }

        function showDossier() { document.getElementById('dashboard-view').style.display = 'none'; document.getElementById('dossier-section').style.display = 'block'; }
        function showDashboard() { 
            document.getElementById('dashboard-view').style.display = 'block'; 
            document.getElementById('dossier-section').style.display = 'none';
            fetchChartData(); 
        }

        async function fetchChartData() {
            if (!rArr.some(r => [ROLES.VEDENI, ROLES.MAESTRO].includes(r))) return;
            const { data } = await _supabase.from('vydej_kokainu').select('pocet_vydano, datum').order('datum', {ascending: true});
            if (data) renderChart(data);
        }

        function renderChart(rawData) {
            const ctx = document.getElementById('profiChart');
            if (!ctx) return;
            const stats = {};
            rawData.forEach(r => { const d = new Date(r.datum).toLocaleDateString(); stats[d] = (stats[d] || 0) + (parseInt(r.pocet_vydano) || 0); });
            
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(stats),
                    datasets: [{
                        label: 'DISTRIBUCE',
                        data: Object.values(stats),
                        borderColor: '#ff0000',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(255, 0, 0, 0.1)'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#666' } }, x: { ticks: { color: '#666' } } } }
            });
        }

        async function fetchData() {
            if (!uId) return;
            const { data } = await _supabase.from('vydej_kokainu').select('*').eq('user_id', uId).order('datum', {ascending: false});
            if (data) {
                const total = data.reduce((s, r) => s + (parseInt(r.pocet_vydano) || 0), 0);
                document.getElementById('my-vydano').innerText = total + " KS";
                document.getElementById('my-dluh').innerText = total + " KS";
                document.getElementById('d-splneno').innerText = total + " KS";
                
                const lBox = document.getElementById('log-content');
                lBox.innerHTML = '';
                data.forEach(e => {
                    const d = document.createElement('div');
                    d.style.cssText = "border-bottom: 1px solid rgba(255,255,255,0.05); padding: 5px 0; color: #888;";
                    d.innerHTML = `<i>[${new Date(e.datum).toLocaleDateString()}]</i> Vedení <b>POTVRDILO</b> výdej <i>${e.pocet_vydano} KS</i>.`;
                    lBox.appendChild(d);
                });
            }
            fetchMessages();
            fetchChartData();
        }

        async function fetchMessages() {
            const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: true });
            if (data) {
                const cBox = document.getElementById('chat-box');
                cBox.innerHTML = '';
                data.forEach(m => {
                    const d = document.createElement('div');
                    d.className = `bubble ${m.is_admin ? 'admin' : 'user'}`;
                    d.innerHTML = `<div class="bubble-meta">${m.user_name}</div>${m.text}`;
                    cBox.appendChild(d);
                });
                cBox.scrollTop = cBox.scrollHeight;
            }
        }

        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            const txt = inp.value.trim();
            if (!txt) return;
            const isAdm = rArr.includes(ROLES.VEDENI) || rArr.includes(ROLES.MAESTRO);
            await _supabase.from('messages').insert([{ user_id: uId, user_name: uName, text: txt, is_admin: isAdm }]);
            inp.value = '';
        }

        function setupPermissions() {
            const b = document.getElementById('display-badge');
            let l = "OPERATIVEC CJNG";
            if (rArr.includes(ROLES.VEDENI)) { 
                l = "VEDENÍ KARTELU"; 
                document.querySelectorAll('.vedeni-only').forEach(e => e.style.display = 'block'); 
            }
            else if (rArr.includes(ROLES.MAESTRO)) { 
                l = "MAESTRO"; 
                document.querySelectorAll('.maestro-only').forEach(e => e.style.display = 'block'); 
            }
            b.innerHTML = `<span class="role-badge">${l}</span>`;
        }

        _supabase.channel('room1').on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => fetchMessages()).subscribe();
        _supabase.channel('room2').on('postgres_changes', { event: '*', schema: 'public', table: 'vydej_kokainu' }, () => fetchData()).subscribe();

        setupPermissions();
        fetchData();
        
        // Iniciace tlačítka pro otevření (pokud je sidebar defaultně collapsed)
        if(document.getElementById('sidebar').classList.contains('collapsed')) {
            document.getElementById('openBtn').style.display = 'block';
        }

        document.getElementById('msg-input').onkeypress = (e) => { if(e.key==='Enter') sendMessage(); };
    </script>
</body>
</html>
