<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJNG | Šifrovaný Přístup</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        #terminal { 
            width: 85%; 
            max-width: 650px; 
        }
        .line { 
            margin-bottom: 8px; 
            opacity: 0; 
            transform: translateY(10px); 
            animation: fadeIn 0.1s forwards; 
            line-height: 1.4;
        }
        @keyframes fadeIn { 
            to { opacity: 1; transform: translateY(0); } 
        }
        .red { 
            color: #f00; 
            font-weight: bold; 
            text-shadow: 0 0 5px #f00;
        }
        .btn-login { 
            display: none; 
            background: #f00; 
            color: #fff; 
            border: none; 
            padding: 18px 35px; 
            font-family: 'Courier New', monospace; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 30px; 
            box-shadow: 0 0 15px #f00; 
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.3s;
        }
        .btn-login:hover {
            background: #fff;
            color: #f00;
            box-shadow: 0 0 30px #fff;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script>
        const lines = [
            "> INICIALIZACE SYSTÉMU CJNG_OS v4.2.0...",
            "> NAVAZOVÁNÍ ŠIFROVANÉHO SPOJENÍ PŘES PROXY...",
            "> LOKALITA: [UTAJENO]",
            "> OBCHÁZENÍ DISCORD_API_BRÁNY...",
            "> PŘIPOJOVÁNÍ K DATABÁZI SUPABASE_TREZOR...",
            "> [OK] SPOJENÍ JE ZABEZPEČENO.",
            "> VNITŘNÍ SYSTÉM JE PŘIPRAVEN.",
            "<span class='red'>> VAROVÁNÍ: NEOPRÁVNĚNÝ PŘÍSTUP JE MONITOROVÁN.</span>",
            "> IDENTIFIKUJTE SE PRO VSTUP DO SÍTĚ:"
        ];

        const terminal = document.getElementById('terminal');
        let index = 0;

        function addLine() {
            if (index < lines.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = lines[index];
                terminal.appendChild(div);
                index++;
                setTimeout(addLine, 700); // Mírně pomalejší pro lepší čitelnost
            } else {
                const btn = document.createElement('button');
                btn.className = 'btn-login';
                btn.innerHTML = "PŘIHLÁSIT SE PŘES DISCORD";
                
                btn.onclick = () => { 
                    window.location.href = '/api/auth/login'; 
                };
                
                terminal.appendChild(btn);
                btn.style.display = "block";
            }
        }

        window.onload = addLine;
    </script>
</body>
</html>
