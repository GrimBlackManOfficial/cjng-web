<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>CJNG | Encrypted Access</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #terminal { width: 80%; max-width: 600px; }
        .line { margin-bottom: 5px; opacity: 0; transform: translateY(10px); animation: fadeIn 0.1s forwards; }
        .cursor { display: inline-block; width: 10px; height: 20px; background: #0f0; animation: blink 0.8s infinite; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 50% { opacity: 0; } }
        .red { color: #f00; font-weight: bold; }
        .btn-login { display: none; background: #f00; color: #fff; border: none; padding: 15px 30px; font-family: 'Courier New', monospace; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 0 15px #f00; }
    </style>
</head>
<body>
    <div id="terminal"></div>

    <script>
        const lines = [
            "> INITIALIZING CJNG_OS v4.2.0...",
            "> ESTABLISHING ENCRYPTED PROXY...",
            "> LOCATION: HIDDEN",
            "> BYPASSING DISCORD_API_GATEWAY...",
            "> ACCESSING SUPABASE_VAULT...",
            "> [OK] CONNECTION SECURE",
            "> SYSTEM READY.",
            "<span class='red'>> WARNING: UNAUTHORIZED ACCESS IS LOGGED.</span>",
            "> IDENTIFY YOURSELF:"
        ];

        const terminal = document.getElementById('terminal');
        let index = 0;

        function addLine() {
            if (index < lines.length) {
                const div = document.createElement('div');
                div.className = 'line';
                div.innerHTML = lines[index];
                terminal.appendChild(div);
                index++;
                setTimeout(addLine, 600);
            } else {
                const btn = document.createElement('button');
                btn.className = 'btn-login';
                btn.innerHTML = "LOGIN VIA DISCORD";
                btn.onclick = () => alert("Zde se propojí OAuth2 Login...");
                terminal.appendChild(btn);
                btn.style.display = "block";
            }
        }

        addLine();
    </script>
</body>
</html>
