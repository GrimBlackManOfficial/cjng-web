<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>CJNG | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-overlay">
        <div class="term-box" id="term-content"></div>
    </div>

    <nav>
        <div class="brand" style="color:var(--red); text-align:center; font-size: 2em; font-weight:bold; margin-bottom:20px;">CJNG</div>
        <div class="user-info">
            <div id="display-name" style="font-weight:bold;">NAČÍTÁNÍ...</div>
            <div id="display-badge"></div>
        </div>
        <button onclick="loadModule('dossier')">Osobní Dossier</button>
        <button class="vedeni-only" onclick="loadModule('management')" style="display:none;">Vedení</button>
        <button class="maestro-only" onclick="loadModule('ledger')" style="display:none;">Účetní Kniha</button>
    </nav>

    <main id="main-view"></main>

    <script src="app.js"></script>
</body>
</html>
