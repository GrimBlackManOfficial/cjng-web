<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJNG | Operační Systém</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --red: #ff0000; --red-glow: rgba(255, 0, 0, 0.7);
            --bg: #020202; --card-bg: rgba(15, 15, 15, 0.8);
            --border: rgba(255, 0, 0, 0.25);
            --green: #00ff41;
        }
        body { background: var(--bg); color: #fff; font-family: 'Exo 2', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Terminal Welcome Overlay */
        #terminal-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Ubuntu Mono', monospace; color: var(--red);
        }
        .term-box { border: 1px solid var(--red); padding: 40px; background: rgba(10,0,0,0.9); box-shadow: 0 0 30px var(--red-glow); text-align: left; min-width: 450px; position: relative; }
        .term-header { font-size: 0.8em; margin-bottom: 20px; color: #666; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        
        /* Sidebar - Opraveno vysouvání */
        nav { 
            width: 280px; background: #000; border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 30px 15px; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.8); z-index: 2000; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            position: fixed; height: 100%; left: 0; top: 0;
        }
        nav.collapsed { transform: translateX(-280px); }
        .brand { font-family: 'Exo 2'; font-weight: 700; font-size: 2.2em; color: var(--red); text-align: center; letter-spacing: 5px; margin-bottom: 40px; text-shadow: 0 0 10px var(--red-glow); }
        .sidebar-toggle { position: absolute; right: -45px; top: 20px; background: #000; border: 1px solid var(--border); color: var(--red); cursor: pointer; padding: 10px; font-weight: bold; font-size: 1.2em; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }

        /* Jméno s točivým efektem */
        .user-info { padding: 20px; margin-bottom: 30px; background: rgba(0, 0, 0, 0.8); position: relative; border: 1px solid var(--border); overflow: hidden; }
        .user-info::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, transparent, transparent, var(--red)); animation: rotate-border 4s linear infinite; z-index: 0; }
        .user-info::after { content: ""; position: absolute; inset: 2px; background: #000; z-index: 1; }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        .user-content { position: relative; z-index: 2; }
        #display-name { font-weight: 700; font-size: 1.1em; margin-bottom: 10px; color: #fff; letter-spacing: 1px; }
        .role-badge { font-weight: 700; font-size: 0.75em; padding: 4px 10px; border: 1px solid var(--red); color: var(--red); text-transform: uppercase; display: inline-block; letter-spacing: 1px; }

        .menu-container { flex: 1; overflow-y: auto; }
        .menu-category { margin-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .category-trigger { width: 100%; background: none; border: none; color: #aaa; padding: 12px 10px; text-align: left; font-family: 'Exo 2'; font-weight: 700; font-size: 0.9em; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; letter-spacing: 1px; text-transform: uppercase; }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: rgba(255,255,255,0.02); }
        .submenu.open { max-height: 300px; }
        .nav-link { color: #666; text-decoration: none; display: block; padding: 10px 25px; font-size: 0.9em; transition: 0.3s; text-transform: uppercase; }
        .nav-link:hover { color: #fff; background: rgba(255,255,255,0.05); padding-left: 30px; }
        .logout { padding: 15px; color: #444; cursor: pointer; font-size: 0.8em; text-align: center; border-top: 1px solid var(--border); }

        main { flex: 1; margin-left: 0; padding: 40px; overflow: hidden; background: radial-gradient(circle at center, #1a0202 0%, #020202 100%); display: flex; flex-direction: column; position: relative; transition: margin 0.4s; }
        
        .welcome-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Hacking Satellites Vizualizace */
        #sat-network { position: absolute; inset: 0; pointer-events: none; }
        .satellite { position: absolute; font-family: 'Ubuntu Mono'; color: var(--red); font-size: 10px; text-shadow: 0 0 5px var(--red); white-space: nowrap; }
        .sat-node { width: 4px; height: 4px; background: #fff; box-shadow: 0 0 10px #fff; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .sat-line { position: absolute; height: 1px; background: linear-gradient(90deg, var(--red), transparent); transform-origin: left center; opacity: 0.3; animation: linePulse 2s infinite; }
        @keyframes linePulse { 0%, 100% { opacity: 0.1; transform: scaleX(1); } 50% { opacity: 0.5; transform: scaleX(1.05); } }

        .logo-wrapper { position: relative; width: 450px; height: 450px; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .cjng-logo { 
            width: 300px; height: 300px; 
            background: url('https://r2.fivemanage.com/wOMQm0cEVI73Ppitz2tQP/Ch3dZmRrLL.png') center/contain no-repeat; 
            filter: drop-shadow(0 0 30px var(--red)); z-index: 10; 
            animation: logoFloat 4s ease-in-out infinite; 
        }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-15px) scale(1.02); } }

        /* Dashboard & Stats Styles */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; backdrop-filter: blur(10px); }
        .card-title { font-weight: 700; font-size: 0.8em; color: #666; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .stat { font-family: 'Ubuntu Mono'; font-weight: 700; font-size: 2.2em; }
        
        #dossier-section { display: none; width: 100%; max-width: 1200px; margin: 0 auto; z-index: 50; position: relative;}
        .dossier-header { font-weight: 700; color: var(--red); letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; font-size: 1.8em; border-bottom: 1px solid var(--border); }
        .dossier-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        
        .logs-chat-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; grid-column: span 3; }
        .system-logs, .intercom-panel { background: #000; border: 1px solid var(--border); height: 350px; display: flex; flex-direction: column; }
        .log-header { padding: 10px; background: rgba(255,0,0,0.1); font-weight: 700; color: var(--red); border-bottom: 1px solid var(--border); }
        .log-content, .chat-messages { flex: 1; overflow-y: auto; padding: 15px; font-family: 'Ubuntu Mono'; font-size: 0.9em; }

        .bubble { max-width: 85%; padding: 10px 15px; border-radius: 5px; margin-bottom: 10px; }
        .bubble.admin { align-self: flex-start; background: rgba(255,0,0,0.15); border: 1px solid var(--red); }
        .bubble.user { align-self: flex-end; background: #222; border: 1px solid #444; }

        .chat-input-area { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 10px; }
        .chat-send { background: var(--red); color: #fff; border: none; padding: 0 20px; cursor: pointer; font-weight: 700; }

        @media (max-width: 768px) {
            nav { z-index: 3000; }
            .grid, .dossier-grid, .logs-chat-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="terminal-overlay">
        <div class="term-box">
            <div class="term-header">CJNG_CORE_OS [Verze 4.0.12]</div>
            <div id="term-text"></div>
        </div>
    </div>

    <nav id="sidebar" class="collapsed">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <div class="brand">CJNG</div>
        <div class="user-info">
            <div class="user-content">
                <div id="display-name">NAČÍTÁNÍ...</div>
                <div id="display-badge"></div>
            </div>
        </div>

        <div class="menu-container">
            <div class="menu-category">
                <button class="category-trigger" onclick="toggleSubmenu(this)">OSOBNÍ TERMINÁL</button>
                <div class="submenu">
                    <a href="#" class="nav-link" onclick="handleNav('dossier')">Vlastní složka</a>
                </div>
            </div>
            <div class="menu-category maestro-only vedeni-only" style="display:none">
                <button class="category-trigger" onclick="toggleSubmenu(this)">VEDENÍ</button>
                <div class="submenu">
                    <a href="#" class="nav-link" onclick="handleNav('dashboard')">Přehled operací</a>
                </div>
            </div>
        </div>
        <div class="logout" onclick="location.href='/'">Odhlásit se</div>
    </nav>

    <main id="main-content">
        <div id="welcome-view" class="welcome-section">
            <!-- Satelitní síť -->
            <div id="sat-network"></div>
            
            <div class="logo-wrapper">
                <div class="cjng-logo"></div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" style="display: none;">
            <div class="grid">
                <div class="card"><div class="card-title">ODEBRANÉ ZÁSILKY</div><div id="my-vydano" class="stat">0 KS</div></div>
                <div class="card"><div class="card-title">OPERAČNÍ DLUH</div><div id="my-dluh" class="stat" style="color: var(--red);">0 KS</div></div>
                <div class="card"><div class="card-title">STATUS</div><div class="stat" style="color: var(--green);">ONLINE</div></div>
                <div class="card maestro-only vedeni-only" style="grid-column: span 3; display:none">
                    <div class="card-title">ANALYTIKA</div>
                    <div style="height: 300px;"><canvas id="profiChart"></canvas></div>
                </div>
            </div>
        </div>

        <!-- Dossier View -->
        <div id="dossier-section">
            <div class="dossier-header">PERSONÁLNÍ DOSSIER</div>
            <div class="dossier-grid">
                <div class="dossier-card card"><div class="card-title">KVÓTA</div><div id="d-kvota" class="stat">500 KS</div></div>
                <div class="dossier-card card"><div class="card-title">SPLNĚNO</div><div id="d-splneno" class="stat">0 KS</div></div>
                <div class="dossier-card card"><div class="card-title">PROVIZE</div><div class="stat" style="color: var(--green);">125.500$</div></div>
                
                <div class="logs-chat-container">
                    <div class="system-logs">
                        <div class="log-header">LOG_CORE</div>
                        <div id="log-content" class="log-content"></div>
                    </div>
                    <div class="intercom-panel">
                        <div class="log-header">INTERCOM (ENCRYPTED)</div>
                        <div id="chat-box" class="chat-messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="msg-input" class="chat-input" placeholder="Zadej kód...">
                            <button class="chat-send" onclick="sendMessage()">SEND</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://ybzprivahzjqpanvunli.supabase.co'; 
        const SB_KEY = 'sb_publishable_cLNB6oc2TrhDxdelrq6mjQ_0pSZFVb5';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const uName = urlParams.get('user') || "OPERATIVEC";
        const rArr = (urlParams.get('roles') || "").split(',');
        const uId = urlParams.get('id');
        const ROLES = { VEDENI: "1468388299642241281", MAESTRO: "1429877779918491789" };

        // Satelitní Síť Animace
        function createSatellites() {
            const container = document.getElementById('sat-network');
            const satCount = 8;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            for(let i=0; i<satCount; i++) {
                const angle = (i / satCount) * Math.PI * 2;
                const dist = 280 + Math.random() * 50;
                const x = centerX + Math.cos(angle) * dist;
                const y = centerY + Math.sin(angle) * dist;

                // Satelit label
                const sat = document.createElement('div');
                sat.className = 'satellite';
                sat.style.left = x + 'px';
                sat.style.top = y + 'px';
                sat.innerHTML = `<span class="sat-node"></span> SAT_${Math.floor(Math.random()*999)} [LINK_ACTIVE]`;
                container.appendChild(sat);

                // Čára k logu
                const line = document.createElement('div');
                line.className = 'sat-line';
                line.style.left = centerX + 'px';
                line.style.top = centerY + 'px';
                line.style.width = dist + 'px';
                line.style.transform = `rotate(${angle}rad)`;
                container.appendChild(line);
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        function toggleSubmenu(btn) {
            btn.nextElementSibling.classList.toggle('open');
        }

        function handleNav(view) {
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('dashboard-view').style.display = view === 'dashboard' ? 'block' : 'none';
            document.getElementById('dossier-section').style.display = view === 'dossier' ? 'block' : 'none';
            if (window.innerWidth <= 768) toggleSidebar();
        }

        async function startSequence() {
            const term = document.getElementById('term-text');
            const lines = [
                "> BOOTING CJNG_OS...",
                "> CONNECTING TO SATELLITE NETWORK...",
                `> AUTHENTICATED: ${uName.toUpperCase()}`,
                "> ACCESS GRANTED."
            ];
            for(let line of lines) {
                const d = document.createElement('div');
                d.innerHTML = line;
                term.appendChild(d);
                await new Promise(r => setTimeout(r, 400));
            }
            setTimeout(() => {
                document.getElementById('terminal-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('terminal-overlay').remove(), 1000);
                createSatellites();
            }, 1000);
        }

        window.onload = () => {
            document.getElementById('display-name').innerText = uName.toUpperCase();
            let label = "OPERATIVEC";
            if (rArr.includes(ROLES.VEDENI)) label = "VEDENÍ KARTELU";
            if (rArr.includes(ROLES.MAESTRO)) label = "MAESTRO";
            document.getElementById('display-badge').innerHTML = `<span class="role-badge">${label}</span>`;
            
            if (rArr.includes(ROLES.VEDENI) || rArr.includes(ROLES.MAESTRO)) {
                document.querySelectorAll('.vedeni-only').forEach(e => e.style.display = 'block');
            }
            startSequence();
        };
    </script>
</body>
</html>
