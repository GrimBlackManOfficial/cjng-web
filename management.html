<h1 class="view-header">Vedení Operací // Administrace</h1>

<div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card registration-form">
        <h3>REGISTROVAT NOVÉHO ČLENA</h3>
        <p style="font-size: 12px; color: #888;">Vytvoří přístup a osobní složku na základě Discord ID.</p>
        
        <label>DISCORD ID (Číselný kód):</label>
        <input type="text" id="reg-discord-id" placeholder="např. 123456789012345678">
        
        <label>JMÉNO A PŘÍJMENÍ (IC):</label>
        <input type="text" id="reg-name" placeholder="např. Juan Escobar">
        
        <button onclick="registerMember()">VYTVOŘIT SLOŽKU</button>
    </div>

    <div class="card">
        <h3>PŘÍSTUP K DOSSIERŮM</h3>
        <p>Seznam aktivních zaměstnanců:</p>
        <div id="employee-list">
            <button class="nav-btn" style="font-size: 12px;">ZOBRAZIT VŠECHNY SLOŽKY</button>
        </div>
    </div>
</div>
