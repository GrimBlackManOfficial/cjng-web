<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>CJNG | OPERAČNÍ DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* Tady bude ten tvůj moderní červeno-černý design, co jsme dělali */
        :root { --red: #ff0000; --bg: #050000; --card: rgba(20, 0, 0, 0.8); }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { border-left: 4px solid var(--red); padding-left: 20px; margin-bottom: 40px; }
        .header h1 { font-family: 'Orbitron'; letter-spacing: 5px; margin: 0; font-size: 2em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid rgba(255,0,0,0.1); padding: 25px; position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--red); }
        .val { font-size: 3em; font-family: 'Orbitron'; color: var(--red); text-shadow: 0 0 15px rgba(255,0,0,0.4); }
        .label { text-transform: uppercase; letter-spacing: 2px; color: #888; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="display-name">NAČÍTÁNÍ...</h1>
            <div id="display-nick" style="color: var(--red); opacity: 0.7;"></div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="label">Celkem vydáno (KOKAIN)</div>
                <div id="stat-vydano" class="val">0</div>
                <div class="label">Balíčků</div>
            </div>
            
            </div>
    </div>

    <script>
        // Nastavení Supabase
        const _supabase = supabase.createClient('TVOJE_URL', 'TVŮJ_ANON_KEY');

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('id');
            const name = params.get('name');
            const nick = params.get('nick');

            if (!userId) return;

            document.getElementById('display-name').innerText = name;
            document.getElementById('display-nick').innerText = nick ? `KRYCÍ JMÉNO: ${nick}` : "";

            // NAČTENÍ DAT Z TABULKY VYDEJ_KOKAINU
            const { data, error } = await _supabase
                .from('vydej_kokainu')
                .select('pocet_vydano')
                .eq('user_id', userId);

            if (data) {
                // Sečteme všechny řádky, které uživatel má
                const celkem = data.reduce((sum, row) => sum + (parseInt(row.pocet_vydano) || 0), 0);
                document.getElementById('stat-vydano').innerText = celkem.toLocaleString();
            }
        }

        init();
    </script>
</body>
</html>
