<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>CJNG | OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-overlay">
        <div class="term-box" id="term-content"></div>
    </div>

    <nav id="sidebar">
        <div class="brand">CJNG</div>
        
        <div class="user-info">
            <div id="display-name">NAČÍTÁNÍ...</div>
            <div id="display-badge"></div>
        </div>

        <div class="nav-category">
            <div class="category-title">Operace</div>
            <button class="nav-btn" onclick="loadModule('dossier', this)">Osobní Složka</button>
        </div>

        <div class="nav-category vedeni-only" style="display:none;">
            <div class="category-title">Vedení Organizace</div>
            <button class="nav-btn" onclick="loadModule('register', this)">Registrovat Zaměstnance</button>
            <button class="nav-btn" onclick="loadModule('management', this)">Účetní Kniha / Vyplácení</button>
        </div>
    </nav>

    <main id="main-view"></main>

    <script src="app.js"></script>
</body>
</html>
