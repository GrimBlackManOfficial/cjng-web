<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJNG | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --red: #ff0000; --dark: #0a0a0a; --gray: #1a1a1a; --green: #00ff00; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; }
        
        /* Boční menu */
        nav { width: 250px; background: #000; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        .user-info { border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px; }
        .role-tag { font-size: 0.7em; color: var(--red); border: 1px solid var(--red); padding: 2px 5px; margin-top: 5px; display: inline-block; }
        
        .nav-link { color: #888; text-decoration: none; padding: 10px 0; display: block; transition: 0.3s; cursor: pointer; }
        .nav-link:hover { color: var(--red); padding-left: 10px; }
        .active { color: white; font-weight: bold; border-left: 3px solid var(--red); padding-left: 10px; }

        /* Hlavní obsah */
        main { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #1a0505, transparent); }
        .card { background: var(--gray); border: 1px solid #333; padding: 20px; border-radius: 5px; margin-bottom: 20px; }
        h1 { text-transform: uppercase; letter-spacing: 5px; border-bottom: 2px solid var(--red); display: inline-block; padding-bottom: 10px; }
        
        /* Skrývání věcí podle rolí */
        .admin-only, .maestro-only, .vedeni-only { display: none; }
        
        .btn-action { background: var(--red); color: white; border: none; padding: 10px 20px; cursor: pointer; font-family: monospace; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <nav>
        <div class="user-info">
            <div id="username" style="font-weight: bold; font-size: 1.2em;">Načítání...</div>
            <div id="user-role-display"></div>
        </div>
        
        <div class="nav-link active">DASHBOARD</div>
        <div class="nav-link">MOJE SLOŽKA</div>
        <div class="nav-link maestro-only">DISTRIBUCE KOKAINU</div>
        <div class="nav-link vedeni-only">TREZOR & FINANCE</div>
        <div class="nav-link vedeni-only">SEZNAM ZAMĚSTNANCŮ</div>
        <div class="nav-link">PRAVIDLA</div>
        <div class="nav-link" style="margin-top: auto; color: #444;" onclick="location.href='/'">ODPOJIT SE</div>
    </nav>

    <main>
        <h1 id="page-title">SYSTÉMOVÝ PŘEHLED</h1>
        
        <div class="vedeni-only card">
            <h3>CELKOVÝ DLUH ORGANIZACE</h3>
            <div style="font-size: 2.5em; color: var(--red);" id="org-debt">0 ks</div>
        </div>

        <div class="card">
            <h3>MOJE AKTUÁLNÍ STATISTIKY</h3>
            <p>Vydáno: <span id="my-vydano">0</span> ks</p>
            <p>Odevzdáno: <span id="my-odevzdano">0</span> ks</p>
            <p>Dluh u organizace: <span id="my-dluh" style="color: var(--red);">0</span> ks</p>
        </div>

        <div class="maestro-only card">
            <h3>SPRÁVA DISTRIBUCE</h3>
            <div id="admin-table-area">
                </div>
        </div>
    </main>

    <script>
        // --- KONFIGURACE ROLÍ (SEM VLOŽ SVÁ ID Z DISCORDU) ---
        const ROLES = {
            VEDENI: 1468388299642241281,
            MAESTRO: 1429877779918491789,
            IT_TECHNIK: 1489322789205971174,
            MARINA: 1417573119664722185
        };

        // Načtení dat z URL (přidáno callbackem)
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user') || "Neznámý";
        const userRoles = (urlParams.get('roles') || "").split(',');

        document.getElementById('username').innerText = username;

        // --- LOGIKA ROZDĚLENÍ PRÁV ---
        function checkPermissions() {
            // Vedení
            if (userRoles.includes(ROLES.VEDENI) || userRoles.includes(ROLES.IT_TECHNIK)) {
                document.querySelectorAll('.vedeni-only').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.maestro-only').forEach(el => el.style.display = 'block');
                document.getElementById('user-role-display').innerHTML += '<span class="role-tag">VEDENÍ</span> ';
            }
            // Maestro
            else if (userRoles.includes(ROLES.MAESTRO)) {
                document.querySelectorAll('.maestro-only').forEach(el => el.style.display = 'block');
                document.getElementById('user-role-display').innerHTML += '<span class="role-tag">MAESTRO</span> ';
            }
            // Marina (Jen náhled)
            else if (userRoles.includes(ROLES.MARINA)) {
                document.querySelectorAll('.vedeni-only').forEach(el => el.style.display = 'block');
                // Tady bychom později vypnuli tlačítka pro úpravu
                document.getElementById('user-role-display').innerHTML += '<span class="role-tag">MARINA</span> ';
            }
            else {
                document.getElementById('user-role-display').innerHTML += '<span class="role-tag">SICARIO</span> ';
            }
        }

        checkPermissions();

        // SEM POTOM DOPÍŠEME TY FUNKCE PRO SUPABASE (GRAFY, TABULKY ATD.)
    </script>
</body>
</html>
